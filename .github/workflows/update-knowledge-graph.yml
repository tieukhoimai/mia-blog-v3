name: Update Knowledge Graph

on:
  push:
    branches: [main]
    paths:
      - 'data/blog/**'

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch with token so the bot can push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Regenerate knowledge graph
        run: node scripts/generate-graph.mjs

      - name: Commit updated graph data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/graph-data.json public/graph-data.json
          if git diff --staged --quiet; then
            echo "No graph changes to commit."
          else
            git commit -m "chore: regenerate knowledge graph"
            git push
          fi
